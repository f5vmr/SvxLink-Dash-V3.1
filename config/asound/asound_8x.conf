# /etc/asound.conf
#
# ICS 8x / MCH audio profile
#
# Intended channel model:
#
#   Port 1 = capture channel 0 / playback channel 0
#   Port 2 = capture channel 1 / playback channel 1
#   Port 3 = capture channel 2 / playback channel 2
#   Port 4 = capture channel 3 / playback channel 3
#   Port 5 = capture channel 4 / playback channel 4
#   Port 6 = capture channel 5 / playback channel 5
#   Port 7 = capture channel 6 / playback channel 6
#   Port 8 = capture channel 7 / playback channel 7
#
# ALSA format expected by the MCH board:
#   48000 Hz, S32_LE

pcm.loophw {
    type hw
    card Loopback
    device 0
    subdevice 0
}

pcm.loopout {
    type plug
    slave.pcm "loophw"
}

# -----------------------------
# RX: capture chain
# -----------------------------

pcm.dsnoop_rx_all {
    type dsnoop
    ipc_key 3000
    slave {
        pcm "hw:0,0"
        channels 8
        rate 48000
        format S32_LE
    }
}

pcm.route_rx1 {
    type route
    slave.pcm "dsnoop_rx_all"
    slave.channels 10
    ttable.0.0 1
}

pcm.route_rx2 {
    type route
    slave.pcm "dsnoop_rx_all"
    slave.channels 10
    ttable.1.0 1
}

pcm.route_rx3 {
    type route
    slave.pcm "dsnoop_rx_all"
    slave.channels 10
    ttable.2.0 1
}

