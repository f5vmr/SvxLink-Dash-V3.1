    slave.channels 10
    ttable.4.0 1
}

pcm.route_rx6 {
    type route
    slave.pcm "dsnoop_rx_all"
    slave.channels 10
    ttable.5.0 1
}

pcm.route_rx7 {
    type route
    slave.pcm "dsnoop_rx_all"
    slave.channels 10
    ttable.6.0 1
}

pcm.route_rx8 {
    type route
    slave.pcm "dsnoop_rx_all"
    slave.channels 10
    ttable.7.0 1
}

pcm.rx1 {
    type plug
    slave.pcm "route_rx1"
}

pcm.rx2 {
    type plug
    slave.pcm "route_rx2"
}

pcm.rx3 {
    type plug
    slave.pcm "route_rx3"
}

pcm.rx4 {
    type plug
    slave.pcm "route_rx4"
}

pcm.rx5 {
