# /etc/asound.conf
#
# ICS 1x / SGTL5000
#
# Assumptions:
#   - Raspberry Pi onboard audio is disabled
#   - SGTL5000 appears as card 0, device 0
#   - Port 1 RX audio uses the Right capture channel
#   - Port 1 TX audio uses the Right playback channel
#
# ALSA channels:
#   0 = Left
#   1 = Right

pcm.loophw {
    type hw
    card Loopback
    device 0
    subdevice 0
}

pcm.loopout {
    type plug
    slave.pcm "loophw"
}

# -----------------------------
# RX Section
# -----------------------------

pcm.dsnoop_rx_all {
    type dsnoop
    ipc_key 3000
    slave {
        pcm "hw:0,0"
        channels 2
        rate 48000
    }
}

pcm.route_rx1 {
    type route
    slave.pcm "dsnoop_rx_all"
    slave.channels 2

    # Port 1 RX from Right input channel
    ttable.1.0 1
}

pcm.rx1 {
    type plug
    slave.pcm "route_rx1"
}

# -----------------------------
# TX Section
# -----------------------------

pcm.dmix_tx_all {
    type dmix
    ipc_key 4000
    slave {
        pcm "hw:0,0"
        channels 2
        rate 48000
    }
}

pcm.route_tx1 {
    type route
    slave.pcm "dmix_tx_all"
    slave.channels 2

    # Port 1 TX to Right output channel
    ttable.0.1 1
}

pcm.tx1 {
    type plug
    slave.pcm "route_tx1"
}