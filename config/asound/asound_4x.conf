pcm.loophw {
    type hw
    card Loopback
    device 0
    subdevice 0
}

pcm.loopout {
    type plug
    slave.pcm "loophw"
}

# -----------------------------
# RX: capture chain
# -----------------------------

pcm.dsnoop_rx_all {
    type dsnoop
    ipc_key 3000
    slave {
        pcm "hw:0,0"
        channels 4
        rate 48000
        format S32_LE
    }
}

pcm.route_rx1 {
    type route
    slave.pcm "dsnoop_rx_all"
    slave.channels 4
    ttable.0.0 1
}

pcm.route_rx2 {
    type route
    slave.pcm "dsnoop_rx_all"
    slave.channels 4
    ttable.1.0 1
}

pcm.route_rx3 {
    type route
    slave.pcm "dsnoop_rx_all"
    slave.channels 4
    ttable.2.0 1
}

pcm.route_rx4 {
    type route
    slave.pcm "dsnoop_rx_all"
    slave.channels 4
    ttable.3.0 1
}

pcm.rx1 {
    type plug
    slave.pcm "route_rx1"
}

pcm.rx2 {
    type plug
    slave.pcm "route_rx2"
}

pcm.rx3 {
    type plug
    slave.pcm "route_rx3"
}

pcm.rx4 {
    type plug
    slave.pcm "route_rx4"
}

# -----------------------------
# TX: playback chain
# -----------------------------

pcm.dmix_tx_all {
    type dmix
    ipc_key 4000
    slave {
        pcm "hw:0,0"
        channels 4
        rate 48000
        format S32_LE
    }
}

pcm.route_tx1 {
    type route
    slave.pcm "dmix_tx_all"
    slave.channels 4
    ttable.0.0 1
}

pcm.route_tx2 {
    type route
    slave.pcm "dmix_tx_all"
    slave.channels 4
    ttable.0.1 1
}

pcm.route_tx3 {
    type route
    slave.pcm "dmix_tx_all"
    slave.channels 4
    ttable.0.2 1
}

pcm.route_tx4 {
    type route
    slave.pcm "dmix_tx_all"
    slave.channels 4
    ttable.0.3 1
}

pcm.tx1 {
    type plug
    slave.pcm "route_tx1"
}

pcm.tx2 {
    type plug
    slave.pcm "route_tx2"
}

pcm.tx3 {
    type plug
    slave.pcm "route_tx3"
}

pcm.tx4 {
    type plug
    slave.pcm "route_tx4"
}